    <span id="runtime_span"></span> 
    <script type="text/javascript">
        function show_runtime() {
            
            setTimeout(show_runtime, 1000);

            
            const startDate = new Date("2025/02/22 00:00:00");

            
            const now = new Date();

            
            const diff = now.getTime() - startDate.getTime();

            
            const days = Math.floor(diff / (24 * 60 * 60 * 1000));                     
            const hours = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000)); 
            const minutes = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));        
            const seconds = Math.floor((diff % (60 * 1000)) / 1000);                    

            
            const lang = document.documentElement.lang || "en"; 

            
            const translations = {
                zh: `网站已运行 ${days} 天 ${hours} 小时 ${minutes} 分 ${seconds} 秒`,
                ja: `サイトは稼働してから ${days}日 ${hours}時間 ${minutes}分 ${seconds}秒`,
                en: `Site has been running for ${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`
            };

            
            const output = translations[lang] || translations["en"];

            
            document.getElementById("runtime_span").innerHTML = output;
        }

        
        show_runtime();
    </script>

<div id="mini-player-wrapper">
  <div id="music-panel">
    <div id="music-title">Loading...</div>
    <ul id="playlist"></ul>
  </div>
  <div id="mini-player">
    <button id="toggle-panel" title="Show/Hide Playlist">📂</button>
    <button id="prev-btn" title="Previous">⏮️</button>
    <button id="play-btn" title="Play">▶️</button>
    <button id="next-btn" title="Next">⏭️</button>
  </div>
  <audio id="mini-audio"></audio>
</div>

<script>
  const base = "https://yuuniji.github.io/music/lofi_beats/";
  const jsonURL = base + "songs.json";

  const STORAGE_KEY = "hugo_music_player_state";
  const INTERACT_KEY = "hugo_music_player_user_interacted";

  async function initMusicPanel() {
    const res = await fetch(jsonURL);
    const songs = await res.json();
    if (!songs.length) return;

    let i = 0;
    let isPlaying = false;

    const audio = document.getElementById("mini-audio");
    const playBtn = document.getElementById("play-btn");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const toggleBtn = document.getElementById("toggle-panel");
    const panel = document.getElementById("music-panel");
    const title = document.getElementById("music-title");
    const playlist = document.getElementById("playlist");

    function savePlayState() {
      const state = {
        index: i,
        time: audio.currentTime,
        isPlaying: !audio.paused,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function saveUserInteraction() {
      localStorage.setItem(INTERACT_KEY, "true");
    }

    function hasUserInteracted() {
      return localStorage.getItem(INTERACT_KEY) === "true";
    }

    
    const savedStateStr = localStorage.getItem(STORAGE_KEY);
    if (savedStateStr) {
      try {
        const savedState = JSON.parse(savedStateStr);
        if (savedState.index >= 0 && savedState.index < songs.length) {
          i = savedState.index;
          audio.currentTime = savedState.time || 0;
          isPlaying = savedState.isPlaying || false;
        }
      } catch(e) {
        console.warn("Failed to parse saved player state:", e);
      }
    }

    songs.forEach((song, index) => {
      const li = document.createElement("li");
      li.textContent = `${song.title} - ${song.artist}`;
      li.onclick = () => {
        i = index;
        loadAndPlay(i);
        saveUserInteraction();
      };
      playlist.appendChild(li);
    });

    function highlightActive(index) {
      playlist.querySelectorAll("li").forEach((li, idx) => {
        li.classList.toggle("active", idx === index);
      });
    }

    function loadAndPlay(index) {
      audio.src = base + songs[index].file;
      audio.currentTime = 0;
      audio.play().then(() => {
        isPlaying = true;
        playBtn.textContent = "⏸️";
        title.textContent = `${songs[index].title} - ${songs[index].artist}`;
        highlightActive(index);
        savePlayState();
      }).catch(() => {
        
        isPlaying = false;
        playBtn.textContent = "▶️";
      });
    }

    
    audio.src = base + songs[i].file;
    title.textContent = `${songs[i].title} - ${songs[i].artist}`;
    highlightActive(i);

    
    window.addEventListener('load', () => {
      audio.play().then(() => {
        playBtn.textContent = "⏸️";
        isPlaying = true;
      }).catch(() => {
        playBtn.textContent = "▶️";
        isPlaying = false;
      });
    });

    playBtn.onclick = () => {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸️";
        isPlaying = true;
        saveUserInteraction();
      } else {
        audio.pause();
        playBtn.textContent = "▶️";
        isPlaying = false;
      }
      savePlayState();
    };

    prevBtn.onclick = () => {
      i = (i - 1 + songs.length) % songs.length;
      loadAndPlay(i);
      saveUserInteraction();
    };

    nextBtn.onclick = () => {
      i = (i + 1) % songs.length;
      loadAndPlay(i);
      saveUserInteraction();
    };

    toggleBtn.onclick = () => {
      panel.classList.toggle("show");
    };

    audio.ontimeupdate = () => {
      savePlayState();
    };

    audio.onended = () => {
      i = (i + 1) % songs.length;
      loadAndPlay(i);
      saveUserInteraction();
    };
  }

  initMusicPanel();
</script>
